# This workflow will load Python and Pixi, then run test based on a Pixi task.

name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  fmt-test:
    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Load Pixi
      uses: prefix-dev/setup-pixi@v0.9.4
      with:
        pixi-version: v0.65.0
        cache: true
        environments: dev

    - name: Lint
      run: pixi run -e dev lint

    - name: Cache smartg auxdata
      uses: actions/cache@v4
      id: cache-auxdata
      with:
        path: ~/.cache/smartg/auxdata
        key: smartg-auxdata-v1

    - name: Download smartg auxdata
      if: steps.cache-auxdata.outputs.cache-hit != 'true'
      run: |
        pixi run -e dev python -c "
        from smartg.auxdata import download
        from pathlib import Path
        download(Path('$HOME/.cache/smartg/auxdata'), data_type='all')
        "

    - name: Test
      env:
        SMARTG_DIR_AUXDATA: ${{ env.HOME }}/.cache/smartg/auxdata
      run: pixi run -e dev test

    - name: Type check with mypy
      run: pixi run -e dev type-check
